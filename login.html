<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 | 永續食光</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">🍃 永續食光</a>
            <ul id="nav-links">
                <!-- Javascript dynamically fills this -->
            </ul>
        </nav>
    </header>

    <main style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 250px);">
        <div class="form-container" style="width: 100%; max-width: 450px;">
            <h1 class="page-title" style="margin-bottom: 2rem;">會員登入</h1>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">帳號名稱</label>
                    <input type="text" id="username" name="username" placeholder="請輸入帳號" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密碼</label>
                    <input type="password" id="password" name="password" placeholder="請輸入密碼" required>
                </div>
                
                <button type="submit" style="margin-top: 2rem;">登入</button>
            </form>
            <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
                還沒有帳號嗎？ <a href="register.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">立即註冊</a>
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 永續食光 - 逢甲大學專屬場域</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
