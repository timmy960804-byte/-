<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店家上架 | 永續食光</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">🍃 永續食光</a>
            <ul id="nav-links">
                <!-- Javascript dynamically fills this -->
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">店家管理後台</h1>
        <p class="page-subtitle">感謝您支持惜食行動，請填寫今日可提供的即期餐點資訊</p>

        <!-- 歷史數據看板 -->
        <section style="margin-bottom: 2rem;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                <div class="card" style="text-align: center; background: #ECFDF5; border: 1px solid #A7F3D0; padding: 1.5rem;">
                    <h4 style="color: #047857; margin-bottom: 0.5rem;">累積拯救食物</h4>
                    <p style="font-size: 2rem; font-weight: bold; color: #065F46;"><span id="store-total-food">0</span> <span style="font-size: 1rem;">份</span></p>
                </div>
                <div class="card" style="text-align: center; background: #EFF6FF; border: 1px solid #BFDBFE; padding: 1.5rem;">
                    <h4 style="color: #1D4ED8; margin-bottom: 0.5rem;">減少碳排量</h4>
                    <p style="font-size: 2rem; font-weight: bold; color: #1E3A8A;"><span id="store-total-carbon">0</span> <span style="font-size: 1rem;">kg</span></p>
                </div>
            </div>
        </section>

        <div class="form-container" style="margin-bottom: 3rem;">
            <form id="store-form">
                <div class="form-group">
                    <label for="store_name">店家名稱 (已綁定帳號)</label>
                    <input type="text" id="store_name" name="store_name" required>
                </div>
                
                <div class="form-group">
                    <label for="box_image">上傳餐點照片 (選填)</label>
                    <input type="file" id="box_image" name="box_image" accept="image/*" style="padding: 0.5rem; width: 100%; border: 1px solid #D1D5DB; border-radius: var(--border-radius-md);">
                </div>

                <div class="form-group">
                    <label for="box_name">餐盒名稱</label>
                    <input type="text" id="box_name" name="box_name" placeholder="例如：招牌排骨飯 (即期)" required>
                </div>
                
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label for="quantity">可提供數量</label>
                        <input type="number" id="quantity" name="quantity" min="1" placeholder="3" required>
                    </div>
                    <div style="flex: 1;">
                        <label for="price">即期優惠價 (NT$)</label>
                        <input type="number" id="price" name="price" min="0" placeholder="80" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="pickup_time">開放領取時間</label>
                    <input type="text" id="pickup_time" name="pickup_time" placeholder="例如：19:00 - 20:00" required>
                </div>
                
                <button type="submit">確認上架</button>
            </form>
        </div>

        <h2 class="page-title" style="font-size: 2rem;">即時訂單管理</h2>
        <p class="page-subtitle">確認消費者到店取餐並收款後，請點擊「確認收款」以發放點數給消費者</p>
        
        <div class="table-container">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>訂單編號</th>
                            <th>預約人</th>
                            <th>餐盒項目</th>
                            <th>應收金額 (已扣除點數)</th>
                            <th>狀態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="store-orders-tbody">
                        <!-- JavaScript 動態產生 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 永續食光 - 逢甲大學專屬場域</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
